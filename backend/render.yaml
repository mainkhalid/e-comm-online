services:
  - type: web
    name: techzone-backend
    env: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: techzone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: techzone-redis
          type: redis
          property: connectionString

  - type: redis
    name: techzone-redis
    plan: free

databases:
  - name: techzone-db
    databaseName: techzone_db
    user: techzone
    plan: free
